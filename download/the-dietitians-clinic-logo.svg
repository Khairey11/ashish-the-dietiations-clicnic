<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none" role="img" aria-label="The Dietitian's Clinic">
  <defs>
    <!-- Primary gradient: deep clinical green -> fresh nutrition green -->
    <linearGradient id="tdcMark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#15803D"/>
      <stop offset="55%" stop-color="#16A34A"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>
    <!-- Soft accent for the pulse line -->
    <linearGradient id="tdcPulse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <!-- Subtle shadow for depth on the mark -->
    <filter id="tdcShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.2"/>
      <feOffset dy="1"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ============ MARK (icon) ============ -->
  <g filter="url(#tdcShadow)">
    <!-- Rounded-square container -->
    <rect x="4" y="8" width="64" height="64" rx="18" fill="url(#tdcMark)"/>

    <!-- Leaf body: two overlapping halves forming a clean leaf silhouette -->
    <path d="M36 22 C46 24 50 32 50 40 C50 50 42 56 32 56 C24 56 18 50 18 42 C18 32 26 24 36 22 Z"
          fill="#FFFFFF" fill-opacity="0.96"/>
    <!-- Leaf central vein -->
    <path d="M36 22 C34 30 32 38 32 56"
          stroke="#15803D" stroke-opacity="0.55" stroke-width="1.4"
          stroke-linecap="round" fill="none"/>
    <!-- Side veins -->
    <path d="M36 28 C40 30 43 32 45 35" stroke="#15803D" stroke-opacity="0.35" stroke-width="1" stroke-linecap="round" fill="none"/>
    <path d="M35 34 C40 36 43 38 45 41" stroke="#15803D" stroke-opacity="0.3" stroke-width="1" stroke-linecap="round" fill="none"/>
    <path d="M35 40 C39 42 42 44 44 46" stroke="#15803D" stroke-opacity="0.25" stroke-width="1" stroke-linecap="round" fill="none"/>

    <!-- Heartbeat pulse line crossing the leaf (clinical signal) -->
    <path d="M14 44 L24 44 L27 36 L31 52 L34 40 L37 44 L58 44"
          stroke="url(#tdcPulse)" stroke-width="2.4"
          stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Pulse end dot -->
    <circle cx="58" cy="44" r="2" fill="#FFFFFF"/>
  </g>

  <!-- ============ WORDMARK ============ -->
  <g font-family="'Inter', 'Segoe UI', system-ui, sans-serif">
    <!-- "The Dietitian's" — semibold, deep ink -->
    <text x="80" y="40" font-size="20" font-weight="700" fill="#0F172A" letter-spacing="-0.3">
      The Dietitian's
    </text>
    <!-- "CLINIC" — spaced, lighter, accent green -->
    <text x="80" y="58" font-size="13" font-weight="600" fill="#16A34A" letter-spacing="3.5">
      C L I N I C
    </text>
  </g>
</svg>
