<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="The Dietitian's Clinic icon">
  <defs>
    <linearGradient id="tdcIconMark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#15803D"/>
      <stop offset="55%" stop-color="#16A34A"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>
    <linearGradient id="tdcIconPulse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>

  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#tdcIconMark)"/>

  <!-- Leaf -->
  <path d="M34 12 C44 14 48 22 48 30 C48 40 40 46 30 46 C22 46 16 40 16 32 C16 22 24 14 34 12 Z"
        fill="#FFFFFF" fill-opacity="0.96"/>
  <path d="M34 12 C32 20 30 28 30 46"
        stroke="#15803D" stroke-opacity="0.55" stroke-width="1.4"
        stroke-linecap="round" fill="none"/>
  <path d="M34 18 C38 20 41 22 43 25" stroke="#15803D" stroke-opacity="0.35" stroke-width="1" stroke-linecap="round" fill="none"/>
  <path d="M33 24 C38 26 41 28 43 31" stroke="#15803D" stroke-opacity="0.3" stroke-width="1" stroke-linecap="round" fill="none"/>
  <path d="M33 30 C37 32 40 34 42 36" stroke="#15803D" stroke-opacity="0.25" stroke-width="1" stroke-linecap="round" fill="none"/>

  <!-- Heartbeat pulse -->
  <path d="M10 34 L22 34 L25 26 L29 42 L32 30 L35 34 L54 34"
        stroke="url(#tdcIconPulse)" stroke-width="2.6"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="54" cy="34" r="2.2" fill="#FFFFFF"/>
</svg>
